<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <title>BlueReferral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=v20-shop-redesign">
</head>
<body>
  <div id="status" class="toast hidden" role="status" aria-live="polite"></div>

  <main id="userApp" class="app-shell" role="main">
    <header class="topbar glass">
      <div>
        <small id="helloText">سلام 👋</small>
        <h1 id="brandTitle">BlueReferral</h1>
      </div>
      <button class="icon-btn" id="openPalette" title="تنظیم رنگ" aria-label="تنظیم رنگ Mini App">🎨</button>
    </header>

    <section id="homePage" class="page"></section>
    <section id="shopPage" class="page hidden"></section>
    <section id="productPage" class="page hidden"></section>
    <section id="ordersPage" class="page hidden"></section>
    <section id="walletPage" class="page hidden"></section>

    <nav class="bottom-nav glass" role="navigation" aria-label="ناوبری پایین">
      <button data-tab="home" class="active"><span>👤</span>پروفایل</button>
      <button data-tab="shop"><span>🛒</span>فروشگاه</button>
      <button data-tab="orders"><span>🧾</span>سفارش‌ها</button>
      <button data-tab="wallet"><span>💰</span>کیف پول</button>
    </nav>
  </main>

  <main id="adminApp" class="app-shell hidden admin-shell">
    <header class="topbar glass">
      <div>
        <small>پنل مدیریت Mini App</small>
        <h1>BlueReferral Admin</h1>
      </div>
      <button class="icon-btn" id="openCmdPalette" title="جستجوی دستور (⌘K)" aria-label="جستجوی دستور">⌘</button>
      <button class="icon-btn" id="reloadAdmin" aria-label="رفرش پنل">↻</button>
    </header>
    <section id="adminStats" class="stats-grid"></section>
    <nav class="admin-tabs glass">
      <button data-admin-tab="dashboard" class="active">داشبورد</button>
      <button data-admin-tab="products">محصولات</button>
      <button data-admin-tab="categories">دسته‌ها</button>
      <button data-admin-tab="variants">پلن‌ها</button>
      <button data-admin-tab="inventory">انبار</button>
      <button data-admin-tab="orders">سفارش‌ها</button>
      <button data-admin-tab="withdrawals">برداشت‌ها</button>
      <button data-admin-tab="coupons">تخفیف</button>
      <button data-admin-tab="settings">تنظیمات</button>
      <button data-admin-tab="activity">لاگ</button>
      <button data-admin-tab="roles">نقش‌ها</button>
      <button data-admin-tab="backups">بکاپ</button>
    </nav>
    <section id="adminContent" class="admin-content"></section>
  </main>

  <div id="lightbox" class="lightbox"></div>
  <div id="cartSheet" class="cart-sheet"></div>
  <button id="cartFab" class="cart-fab hidden"><span>🛒</span><span class="cart-fab-badge">0</span></button>
  <div id="custDrawer" class="cust-drawer"></div>
  <div id="previewSheet" class="preview-sheet"></div>
  <div id="qrSheet" class="qr-sheet"></div>
  <div id="shareSheet" class="share-sheet"></div>
  <div id="onboarding" class="onboarding"></div>
  <div id="palettePopup" class="palette-popup"></div>
  <div id="cmdPalette" class="cmd-palette"><div class="cmd-inner"><input id="cmdInput" type="text" placeholder="جستجوی دستور یا تب..." autocomplete="off"><div id="cmdList" class="cmd-list"></div></div></div>

  <dialog id="inputDialog" class="dialog-card bottom-sheet">
    <form method="dialog">
      <h3 id="dialogTitle">ورودی</h3>
      <p id="dialogText" class="muted"></p>
      <textarea id="dialogInput" rows="5"></textarea>
      <input type="file" id="dialogFileInput" accept="image/*" style="display:none; margin-bottom: 10px; width: 100%;" />
      <div class="dialog-actions">
        <button value="cancel" class="secondary">لغو</button>
        <button id="dialogSubmit" value="ok" class="primary">ثبت</button>
      </div>
    </form>
  </dialog>

  <dialog id="editDialog" class="dialog-card wide bottom-sheet">
    <form method="dialog" id="editForm">
      <h3 id="editTitle">ویرایش</h3>
      <div id="editFields" class="form-grid"></div>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">لغو</button>
        <button id="editSubmit" value="ok" class="primary">ذخیره</button>
      </div>
    </form>
  </dialog>

  <div id="ptrIndicator" class="ptr-indicator">
    <svg class="ptr-svg" viewBox="0 0 40 40">
      <path class="ptr-path" d="M20 4 a16 16 0 1 1 0 32 a16 16 0 1 1 0 -32" />
    </svg>
  </div>

  <script>
    // Dev loader: append dev.init.js when ?dev=1 is present
    if (location.search.includes('dev=1')) {
      const s = document.createElement('script');
      s.src = 'dev.init.js';
      s.defer = false;
      document.head.appendChild(s);
    }
  </script>
  <script src="app.js?v=v46-ios-action-sheets"></script>
  <script>
    // Remove the in-page palette quick-button if present (restore original layout)
    const _removePaletteQuick = () => { const el = document.getElementById('paletteQuick'); if(el) el.remove(); };
    document.addEventListener('DOMContentLoaded', _removePaletteQuick);
    new MutationObserver(_removePaletteQuick).observe(document.body, {childList:true, subtree:true});
  </script>
</body>
</html>
