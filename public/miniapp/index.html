<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <title>BlueReferral</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=backup1">
</head>
<body>
  <div id="status" class="toast hidden"></div>

  <main id="userApp" class="app-shell">
    <header class="topbar glass">
      <div>
        <small id="helloText">سلام 👋</small>
        <h1 id="brandTitle">BlueReferral</h1>
      </div>
      <button class="icon-btn" id="openPalette" title="تنظیم رنگ">🎨</button>
    </header>

    <section id="homePage" class="page"></section>
    <section id="shopPage" class="page hidden"></section>
    <section id="productPage" class="page hidden"></section>
    <section id="ordersPage" class="page hidden"></section>
    <section id="walletPage" class="page hidden"></section>

    <nav class="bottom-nav glass">
      <button data-tab="home" class="active"><span>👤</span>پروفایل</button>
      <button data-tab="shop"><span>🛒</span>فروشگاه</button>
      <button data-tab="orders"><span>🧾</span>سفارش‌ها</button>
      <button data-tab="wallet"><span>💰</span>کیف پول</button>
    </nav>
  </main>

  <main id="adminApp" class="app-shell hidden admin-shell">
    <header class="topbar glass">
      <div>
        <small>پنل مدیریت Mini App</small>
        <h1>BlueReferral Admin</h1>
      </div>
      <button class="icon-btn" id="reloadAdmin">↻</button>
    </header>
    <section id="adminStats" class="stats-grid"></section>
    <nav class="admin-tabs glass">
      <button data-admin-tab="dashboard" class="active">داشبورد</button>
      <button data-admin-tab="products">محصولات</button>
      <button data-admin-tab="categories">دسته‌ها</button>
      <button data-admin-tab="variants">پلن‌ها</button>
      <button data-admin-tab="inventory">انبار</button>
      <button data-admin-tab="orders">سفارش‌ها</button>
      <button data-admin-tab="backup">بکاپ</button>
      <button data-admin-tab="settings">تنظیمات</button>
    </nav>
    <section id="adminContent" class="admin-content"></section>
  </main>

  <dialog id="inputDialog" class="dialog-card">
    <form method="dialog">
      <h3 id="dialogTitle">ورودی</h3>
      <p id="dialogText" class="muted"></p>
      <textarea id="dialogInput" rows="5"></textarea>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">لغو</button>
        <button id="dialogSubmit" value="ok" class="primary">ثبت</button>
      </div>
    </form>
  </dialog>

  <dialog id="editDialog" class="dialog-card wide">
    <form method="dialog" id="editForm">
      <h3 id="editTitle">ویرایش</h3>
      <div id="editFields" class="form-grid"></div>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">لغو</button>
        <button id="editSubmit" value="ok" class="primary">ذخیره</button>
      </div>
    </form>
  </dialog>

  <script src="app.js?v=backup1"></script>
</body>
</html>
