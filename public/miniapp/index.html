<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BlueReferral Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="status" class="toast hidden"></div>

  <main id="userApp" class="app-shell">
    <header class="shop-header">
      <button id="searchToggle" class="top-icon">⌕</button>
      <h1>محصولات</h1>
      <button id="refreshBtn" class="top-icon">‹</button>
    </header>
    <input id="shopSearch" class="shop-search hidden" placeholder="جستجوی محصول..." />
    <section id="shopLanding" class="shop-landing"></section>
    <section id="productPage" class="product-page hidden"></section>
    <section id="ordersPage" class="orders-page hidden"></section>
    <section id="walletPage" class="wallet-page hidden"></section>
    <nav class="bottom-nav">
      <button data-tab="shop" class="active">🛍<span>فروشگاه</span></button>
      <button data-tab="orders">🧾<span>سفارش‌های من</span></button>
      <button data-tab="wallet">💰<span>کیف پول</span></button>
      <button id="supportBtn">❔<span>پشتیبانی</span></button>
    </nav>
  </main>

  <main id="adminApp" class="admin-shell hidden">
    <header class="shop-header admin-head">
      <button id="adminBack" class="top-icon">↻</button>
      <h1>مینی پنل ادمین</h1>
      <button id="adminClose" class="top-icon">×</button>
    </header>
    <section id="adminStats" class="admin-stats"></section>
    <nav class="admin-tabs">
      <button data-admin-tab="products" class="active">محصولات</button>
      <button data-admin-tab="categories">دسته‌ها</button>
      <button data-admin-tab="inventory">انبار</button>
      <button data-admin-tab="orders">سفارش‌ها</button>
      <button data-admin-tab="variants">پلن‌ها</button>
    </nav>
    <section id="adminContent" class="admin-content"></section>
  </main>

  <dialog id="inputDialog" class="dialog-card">
    <h3 id="dialogTitle">—</h3>
    <p id="dialogText">—</p>
    <textarea id="dialogInput" rows="4" placeholder="اینجا بنویس..."></textarea>
    <div class="dialog-actions">
      <button id="dialogCancel">لغو</button>
      <button id="dialogSubmit" class="primary">ثبت</button>
    </div>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
